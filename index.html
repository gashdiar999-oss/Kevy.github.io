

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEVY | #1 Indigo Executor</title>
    <style>
        :root { --primary: #6366f1; --bg: #050508; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Inter', 'Segoe UI', sans-serif; overflow: hidden; 
        }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .vignette { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.9) 100%); 
            z-index: 2; pointer-events: none; 
        }
        .wrapper { 
            position: relative; z-index: 10; display: flex; 
            align-items: center; justify-content: center; height: 100vh; 
        }
        .card { 
            background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(20px); 
            border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 30px; 
            padding: 40px; width: 85%; max-width: 800px; text-align: center; 
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }
        h1 { 
            font-size: 5rem; font-weight: 900; margin: 0; letter-spacing: -3px;
            background: linear-gradient(to bottom, #fff, var(--primary)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }
        .status { color: #4ade80; font-weight: bold; font-size: 0.8rem; margin-bottom: 10px; display: block; }
        .btn { 
            background: var(--primary); color: white; padding: 18px 45px; 
            border-radius: 12px; font-weight: 800; text-decoration: none; 
            display: inline-block; margin: 25px 0; transition: 0.3s; 
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); 
        }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 15px 45px var(--primary); }
        .preview { width: 100%; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="vignette"></div>
    <canvas id="c"></canvas>
    <div class="wrapper">
        <div class="card">
            <span class="status">● UNDETECTED</span>
            <h1>KEVY</h1>
            <p style="color:#888;">Next-gen execution. Indigo speed.</p>
            
            <a href="https://www.mediafire.com/file/90ns15tmh5x57n7/Kevy.zip/file" class="btn">DOWNLOAD NOW</a>

            <img src="kevy.png" alt="Executor UI" class="preview">
        </div>
    </div>
    <script>
        const c = document.getElementById('c'), x = c.getContext('2d');
        function r() { c.width = window.innerWidth; c.height = window.innerHeight; }
        window.onresize = r; r();
        let p = Array.from({length: 40}, () => ({x: Math.random()*c.width, y: Math.random()*c.height, s: Math.random()*2+1, l: Math.random()*30+10}));
        function d() {
            x.clearRect(0,0,c.width,c.height); x.strokeStyle = 'rgba(99, 102, 241, 0.4)';
            p.forEach(i => { x.beginPath(); x.moveTo(i.x, i.y); x.lineTo(i.x, i.y+i.l); x.stroke(); i.y -= i.s; if(i.y < -50) i.y = c.height+50; });
            requestAnimationFrame(d);
        }
        d();
    </script>
</body>
</html>
