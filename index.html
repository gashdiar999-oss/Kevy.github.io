<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEVY | #1 Indigo Executor</title>
    <style>
        /* XENO INDIGO THEME */
        :root {
            --accent: #6366f1;
            --bg: #050508;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* The Rocket Background */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Main Content Layer */
        .ui-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
        }

        .glass-card {
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 50px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to bottom, #ffffff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .status {
            color: #4ade80;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .btn {
            background: var(--accent);
            color: white;
            padding: 18px 45px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            margin: 20px 0;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px var(--accent);
        }

        /* Your Image Placement */
        .exec-img {
            width: 100%;
            max-width: 750px;
            border-radius: 15px;
            margin-top: 30px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            display: block; /* Ensures it's not hidden */
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="ui-wrapper">
        <div class="glass-card">
            <div class="status">● UNDETECTED</div>
            <h1>KEVY</h1>
            <p style="color: #888; font-size: 1.2rem;">Next-generation execution. Fast. Stable. Indigo.</p>
            
            <a href="kevy.zip" class="btn" download>DOWNLOAD EXECUTOR</a>

            <img src="kevy.png" alt="Kevy UI" class="exec-img">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        for(let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                v: Math.random() * 2 + 0.5,
                l: Math.random() * 30 + 10
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 1;
            particles.forEach(p => {
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x, p.y + p.l);
                ctx.stroke();
                p.y -= p.v;
                if(p.y < -50) p.y = canvas.height + 50;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
