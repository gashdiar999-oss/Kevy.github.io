<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEVY | #1 Indigo Executor</title>
    <style>
        :root { --primary: #6366f1; --bg: #050508; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        
        .wrapper { display: flex; flex-direction: column; align-items: center; padding: 80px 20px; text-align: center; }
        
        .glass {
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 50px 30px;
            max-width: 900px; width: 100%;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5.5rem); font-weight: 900; margin: 0;
            background: linear-gradient(to bottom, #fff 30%, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .status-pill {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid rgba(74, 222, 128, 0.3);
            display: inline-block;
            margin-bottom: 20px;
        }

        .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin: 30px 0; }

        .btn {
            padding: 18px 40px; border-radius: 12px; font-weight: 800;
            text-decoration: none; transition: 0.3s;
        }

        .btn-main {
            background: var(--primary); color: white;
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.5);
        }

        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 0 40px var(--primary); }

        .btn-discord {
            background: #5865F2; color: white;
        }

        .screenshot {
            width: 100%; max-width: 800px; border-radius: 15px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <canvas id="rockets"></canvas>

    <div class="wrapper">
        <div class="glass">
            <div class="status-pill">STATUS: UNDETECTED</div>
            <h1>KEVY</h1>
            <p style="color: #94a3b8; font-size: 1.2rem; margin-top: 10px;">The next generation of execution.</p>
            
            <div class="btn-group">
                <a href="YOUR_EXTERNAL_LINK_HERE" class="btn btn-main">DOWNLOAD (.ZIP)</a>
                <a href="YOUR_DISCORD_LINK" class="btn btn-discord">JOIN DISCORD</a>
            </div>
            
            <img src="kevy.png" alt="Kevy Interface" class="screenshot">
        </div>
    </div>

    <script>
        const c = document.getElementById('rockets');
        const x = c.getContext('2d');
        function res() { c.width = window.innerWidth; c.height = window.innerHeight; }
        window.onresize = res; res();

        let p = Array.from({length: 40}, () => ({
            x: Math.random() * c.width,
            y: Math.random() * c.height,
            s: Math.random() * 1.5 + 0.5,
            l: Math.random() * 40 + 10
        }));

        function draw() {
            x.clearRect(0,0,c.width,c.height);
            x.strokeStyle = 'rgba(99, 102, 241, 0.4)'; x.lineWidth = 1;
            p.forEach(i => {
                x.beginPath(); x.moveTo(i.x, i.y); x.lineTo(i.x, i.y+i.l); x.stroke();
                i.y -= i.s; if(i.y < -50) i.y = c.height + 50;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
