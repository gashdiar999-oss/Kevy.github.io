<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEVY | #1 Executor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --indigo-main: #6366f1;
            --indigo-glow: rgba(99, 102, 241, 0.5);
            --bg-deep: #050508;
            --glass: rgba(15, 15, 20, 0.8);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- Xeno Animated Background --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* --- Glass Navbar --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
        }

        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; }
        .logo span { color: var(--indigo-main); }

        /* --- Hero Section --- */
        .hero {
            padding: 180px 10% 100px;
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .badge {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--indigo-main);
            color: var(--indigo-main);
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-block;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            margin: 0;
            line-height: 0.9;
